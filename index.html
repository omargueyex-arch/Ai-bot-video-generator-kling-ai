<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Video Generator</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 95%;
  max-width: 420px;
  background: rgba(0,0,0,0.7);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 0 20px rgba(0,255,255,0.3);
}

h1 {
  text-align: center;
}

input, select, button, textarea {
  width: 100%;
  margin-top: 10px;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

button {
  background: cyan;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #00cccc;
}

.hidden {
  display: none;
}

.mic {
  background: red;
  color: white;
}

.preview {
  width: 100%;
  margin-top: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container" id="loginBox">
  <h1>🔐 Inserisci API Key</h1>
  <input type="password" id="apiKey" placeholder="AIza...">
  <button onclick="saveKey()">Entra</button>
</div>

<div class="container hidden" id="appBox">
  <h1>🎬 Video Generator AI</h1>

  <textarea id="prompt" placeholder="Descrivi il video..."></textarea>

  <button class="mic" onclick="startMic()">🎤 Parla</button>

  <input type="file" accept="image/*" id="imageInput">

  <img id="preview" class="preview hidden">

  <select id="style">
    <option value="realistico">Realistico</option>
    <option value="anime">Anime</option>
    <option value="cinematografico">Cinematografico</option>
    <option value="cartoon">Cartoon</option>
  </select>

  <button onclick="generateVideo()">🚀 Genera Video</button>

  <p id="status"></p>
</div>

<script>
let apiKey = "";

// LOGIN
function saveKey() {
  const key = document.getElementById("apiKey").value;

  if (!key.startsWith("AIza")) {
    alert("Chiave non valida!");
    return;
  }

  apiKey = key;
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("appBox").classList.remove("hidden");
}

// MICROFONO
function startMic() {
  const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "it-IT";

  recognition.start();

  recognition.onresult = function(event) {
    document.getElementById("prompt").value = event.results[0][0].transcript;
  };
}

// PREVIEW IMMAGINE
document.getElementById("imageInput").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;

  const url = URL.createObjectURL(file);
  const img = document.getElementById("preview");
  img.src = url;
  img.classList.remove("hidden");
});

// GENERAZIONE VIDEO (SIMULATA)
async function generateVideo() {
  const prompt = document.getElementById("prompt").value;
  const style = document.getElementById("style").value;

  if (!prompt) {
    alert("Scrivi qualcosa!");
    return;
  }

  document.getElementById("status").innerText = "⏳ Generazione in corso...";

  // QUI puoi collegare Gemini API
  // esempio base (non completo)

  try {
    const response = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=" + apiKey, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        contents: [{
          parts: [{
            text: "Crea descrizione video: " + prompt + " stile: " + style
          }]
        }]
      })
    });

    const data = await response.json();

    document.getElementById("status").innerText = "✅ Video pronto (simulazione)";
    console.log(data);

  } catch (err) {
    document.getElementById("status").innerText = "❌ Errore";
    console.error(err);
  }
}
</script>

</body>
</html>
